<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat the Fed V2</title>
<style>
body { margin:0; font-family: Arial; background:#F4F1E8; color:#1A1A1A; }
#topbar { display:flex; justify-content:space-between; padding:10px; background:#1F3D2B; color:white; }
#board { height:60vh; display:flex; flex-wrap:wrap; justify-content:center; align-items:center; }
.city {
  width:90px; height:90px; border-radius:50%;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  margin:10px; background:#ddd; border:3px solid #999;
}
.owned { border-color:gold; background:#c8e6c9; }
#bottom { padding:10px; background:white; }
button { padding:12px; margin:5px; border:none; background:#1F3D2B; color:white; border-radius:8px; }
</style>
</head>

<body>

<div id="topbar">
<div id="year">Year 1</div>
<div id="inflation">Inflation: 0%</div>
<div id="rate">Rate: 5%</div>
</div>

<div id="board"></div>

<div id="bottom">
<div id="playerInfo"></div>
<button onclick="roll()">Roll</button>
<button onclick="build()">Build</button>
</div>

<script>
let player = {cash:1000, cities:[], businesses:0};
let inflation = 0;
let year = 1;
let position = 0;

let cities = Array.from({length:12}, (_,i)=>({
  name:"City "+(i+1),
  price:100 + i*20,
  owner:null,
  business:false
}));

function renderBoard(){
  const board = document.getElementById("board");
  board.innerHTML="";
  cities.forEach((c,i)=>{
    let div=document.createElement("div");
    div.className="city"+(c.owner?" owned":"");
    div.innerHTML=`<div>${c.name}</div><div>$${c.price}</div>`;
    board.appendChild(div);
  });
  document.getElementById("playerInfo").innerHTML =
    "Cash: $"+player.cash+" | Cities: "+player.cities.length+" | Businesses: "+player.businesses;
}

function roll(){
  let dice = Math.floor(Math.random()*6)+1;
  position = (position + dice) % cities.length;
  let city = cities[position];

  if(!city.owner){
    if(confirm("Buy "+city.name+" for $"+city.price+"?")){ 
      player.cash -= city.price;
      city.owner = "player";
      player.cities.push(city);
    }
  } else if(city.owner !== "player"){ 
    let rent = 20;
    player.cash -= rent;
  }

  renderBoard();
}

function build(){
  let city = player.cities.find(c=>!c.business);
  if(city && player.cash>=100){
    player.cash -= 100;
    city.business=true;
    player.businesses++;
  }
  renderBoard();
}

renderBoard();
</script>

</body>
</html>
